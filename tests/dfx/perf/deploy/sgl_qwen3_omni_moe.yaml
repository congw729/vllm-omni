# SPDX-License-Identifier: Apache-2.0
#
# SGLang-Omni deploy profile aligned with vllm_omni/deploy/qwen3_omni_moe.yaml.
#
# Mapping (vLLM-Omni -> SGLang-Omni):
#   async_chunk: true                          -> Qwen3OmniSpeechPipelineConfig (partial-start on talker_ar)
#   connectors.connector_of_shared_memory (shm) -> relay_backend: shm
#   stage 0 thinker @ cuda:0, gpu_memory_utilization 0.9
#       -> image_encoder/audio_encoder/thinker on GPU 0 (0.02 + 0.02 + 0.86)
#   stage 1 talker @ cuda:1, gpu_memory_utilization 0.6 -> talker_ar on GPU 1 @ 0.6
#   stage 2 code2wav @ cuda:1, gpu_memory_utilization 0.1 -> code2wav on GPU 1 @ 0.1
#
# Requires 2 GPUs (thinker side on GPU 0, talker+code2wav on GPU 1).

config_cls: Qwen3OmniSpeechPipelineConfig
name: qwen3-omni-moe
model_path: Qwen/Qwen3-Omni-30B-A3B-Instruct
relay_backend: shm

stage_overrides:
  image_encoder:
    runtime:
      resources:
        total_gpu_memory_fraction: 0.02

  audio_encoder:
    runtime:
      resources:
        total_gpu_memory_fraction: 0.02

  thinker:
    runtime:
      resources:
        total_gpu_memory_fraction: 0.86

  talker_ar:
    runtime:
      resources:
        total_gpu_memory_fraction: 0.6

  code2wav:
    runtime:
      resources:
        total_gpu_memory_fraction: 0.1
